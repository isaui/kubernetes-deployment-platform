name: Deploy to Kubesa

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      KUBESA_API_URL: ${{ secrets.KUBESA_API_URL }}
      KUBESA_SERVICE_ID: ${{ secrets.KUBESA_SERVICE_ID }}
      KUBESA_API_KEY: ${{ secrets.KUBESA_API_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Kubesa
        run: |
          echo "Triggering deployment..."

          : "${KUBESA_API_URL:?KUBESA_API_URL secret is required}"
          : "${KUBESA_SERVICE_ID:?KUBESA_SERVICE_ID secret is required}"
          : "${KUBESA_API_KEY:?KUBESA_API_KEY secret is required}"

          KUBESA_API_URL="${KUBESA_API_URL%/}"

          curl -X POST "${KUBESA_API_URL}/api/v1/deployments/git" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceId": "'"${KUBESA_SERVICE_ID}"'",
              "apiKey": "'"${KUBESA_API_KEY}"'",
              "commitId": "${{ github.sha }}",
              "commitMessage": "${{ github.event.head_commit.message }}"
            }'
          
          echo "Deployment initiated. Check deployment status and logs in the Kubesa web interface."
