apiVersion: v1
kind: Secret
metadata:
  name: kubesa-postgres-env
  namespace: kubesa-system
type: Opaque
stringData:
  POSTGRES_DB: "kubesa"
  POSTGRES_USER: "kubesa"
  POSTGRES_PASSWORD: "change-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: kubesa-backend-env
  namespace: kubesa-system
type: Opaque
stringData:
  # Keep this URL in sync with POSTGRES_DB, POSTGRES_USER, and POSTGRES_PASSWORD.
  DATABASE_URL: "postgresql://kubesa:change-me@kubesa-postgres.kubesa-system.svc.cluster.local:5432/kubesa?sslmode=disable"
  JWT_SECRET: "change-me"
  DEFAULT_ADMIN_EMAIL: "admin@example.com"
  DEFAULT_ADMIN_PASSWORD: "change-me"
  DEFAULT_ADMIN_USERNAME: "admin"
  DEFAULT_ADMIN_NAME: "Default Admin"
  PORT: "8080"
  DEFAULT_DOMAIN: "app.example.com"
  DEFAULT_REGISTRY_ENABLED: "true"
  DEFAULT_REGISTRY_NAME: "Default Registry"
  TCP_PROXY_HOST: "proxy.app.example.com"
  TCP_PROXY_NAMESPACE: "kubesa-system"
  TCP_PROXY_NAME: "tcp-proxy"
  TCP_PROXY_PORT_START: "24000"
  TCP_PROXY_PORT_END: "24999"
  CORS_ALLOWED: "https://kubesa.app.example.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: kubesa-frontend-env
  namespace: kubesa-system
type: Opaque
stringData:
  API_BASE_URL: "https://api.app.example.com"
  LOAD_BALANCER_IP: "1.2.3.4"
  NODE_ENV: "production"
  PORT: "3000"
