apiVersion: v1
kind: ConfigMap
metadata:
  name: kubesa-backend-env
  namespace: kubesa-system
data:
  PORT: "8080"
  K8S_PROXY_URL: "http://127.0.0.1:8001"
  CORS_ALLOWED: "https://kubesa.app.example.com"
  DEFAULT_DOMAIN: "app.example.com"
  DEFAULT_REGISTRY_ENABLED: "true"
  DEFAULT_REGISTRY_NAME: "Default Registry"
  TCP_PROXY_HOST: "proxy.app.example.com"
  TCP_PROXY_NAMESPACE: "kubesa-system"
  TCP_PROXY_NAME: "tcp-proxy"
  TCP_PROXY_PORT_START: "24000"
  TCP_PROXY_PORT_END: "24999"
  SERVER_IP: "1.2.3.4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesa-backend
  namespace: kubesa-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesa-backend
  template:
    metadata:
      labels:
        app: kubesa-backend
    spec:
      serviceAccountName: kubesa
      containers:
        - name: backend
          image: "ghcr.io/your-org/kubesa-backend:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: kubesa-backend-env
            - configMapRef:
                name: kubesa-backend-env
        - name: kubectl-proxy
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          args:
            - proxy
            - --address=0.0.0.0
            - --port=8001
            - --accept-hosts=.*
---
apiVersion: v1
kind: Service
metadata:
  name: kubesa-backend
  namespace: kubesa-system
spec:
  type: ClusterIP
  selector:
    app: kubesa-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubesa-backend
  namespace: kubesa-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - "api.app.example.com"
      secretName: kubesa-backend-tls
  rules:
    - host: "api.app.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubesa-backend
                port:
                  number: 8080
