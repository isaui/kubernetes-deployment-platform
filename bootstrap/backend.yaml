apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesa-backend
  namespace: kubesa-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesa-backend
  template:
    metadata:
      labels:
        app: kubesa-backend
    spec:
      serviceAccountName: kubesa
      containers:
        - name: backend
          image: "kubesa-backend:bootstrap"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: kubesa-backend-env
---
apiVersion: v1
kind: Service
metadata:
  name: kubesa-backend
  namespace: kubesa-system
spec:
  type: ClusterIP
  selector:
    app: kubesa-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubesa-backend
  namespace: kubesa-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - "api.app.example.com"
      secretName: kubesa-backend-tls
  rules:
    - host: "api.app.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubesa-backend
                port:
                  number: 8080
