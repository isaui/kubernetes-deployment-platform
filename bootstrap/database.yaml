apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubesa-postgres-data
  namespace: kubesa-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesa-postgres
  namespace: kubesa-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesa-postgres
  template:
    metadata:
      labels:
        app: kubesa-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: kubesa-postgres-env
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kubesa-postgres-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubesa-postgres-env
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kubesa-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: kubesa-postgres
  namespace: kubesa-system
spec:
  type: ClusterIP
  selector:
    app: kubesa-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
