apiVersion: v1
kind: Namespace
metadata:
  name: kubesa-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesa
  namespace: kubesa-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesa-bootstrap-admin
subjects:
  - kind: ServiceAccount
    name: kubesa
    namespace: kubesa-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
