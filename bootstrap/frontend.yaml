apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesa-frontend
  namespace: kubesa-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesa-frontend
  template:
    metadata:
      labels:
        app: kubesa-frontend
    spec:
      containers:
        - name: frontend
          image: "kubesa-frontend:bootstrap"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: kubesa-frontend-env
---
apiVersion: v1
kind: Service
metadata:
  name: kubesa-frontend
  namespace: kubesa-system
spec:
  type: ClusterIP
  selector:
    app: kubesa-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubesa-frontend
  namespace: kubesa-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - "kubesa.app.example.com"
      secretName: kubesa-frontend-tls
  rules:
    - host: "kubesa.app.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubesa-frontend
                port:
                  number: 3000
